<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - LOST IN ARCHIVE</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-align: center;
            padding: 20px;
        }

        .loader {
            width: 50px;
            height: 1px;
            background: #333;
            margin: 25px 0;
            position: relative;
            overflow: hidden;
        }

        .loader::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #fff;
            animation: loading 2.5s linear forwards;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .error-msg {
            font-size: 11px;
            color: #888;
            max-width: 300px;
            line-height: 1.8;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        p { 
            font-size: 9px; 
            color: #444; 
            margin-top: 10px; 
        }
    </style>
</head>
<body>

    <h2 style="font-weight: 300; font-size: 18px;">Location Not Found</h2>
    
    <div class="loader"></div>

    <div class="error-msg">
        Requested path contains no archived data or the link is broken.
    </div>

    <p>Return journey to Ark Archive in progress...</p>

    <script>
        // ২.৫ সেকেন্ড পর অটোমেটিক মেইন পেজে পাঠিয়ে দেওয়া হবে
        setTimeout(function(){
            window.location.href = "index.html";
        }, 2500);
    </script>
</body>
</html>
