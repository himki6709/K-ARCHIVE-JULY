<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - LOST IN ARCHIVE</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .loader {
            width: 50px;
            height: 1px;
            background: #333;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .loader::after {
            content: '';
            position: absolute;
            left: -100%;
            width: 100%;
            height: 100%;
            background: #fff;
            animation: loading 2s linear;
        }

        @keyframes loading {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        p { font-size: 10px; color: #444; margin-top: 30px; }
    </style>
</head>
<body>

    <h2 style="font-weight: 300;">Location Not Found</h2>
    <div class="loader"></div>
    <p>Redirecting to Ark Archive...</p>

    <script>
        // ২ সেকেন্ড পর অটোমেটিক মেইন পেজে পাঠিয়ে দিবে
        setTimeout(function(){
            window.location.href = "index.html";
        }, 2000);
    </script>
</body>
</html>
