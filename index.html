<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --july-red: #cc0000;
            --july-gold: #FCD535;
        }

        body { background: #000; color: #fff; overflow-x: hidden; }

        /* ARK Logo Visual */
        .ark-logo {
            font-size: 80px; font-weight: 900; color: #fff;
            text-shadow: 0 0 20px var(--july-red); text-align: center;
            letter-spacing: 10px; margin: 20px 0;
        }

        /* Payment Pills - Same Color on Hover */
        .payment-pills .pill {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid #444 !important; transition: 0.3s;
        }
        .payment-pills .pill:hover {
            background: var(--july-red) !important;
            box-shadow: 0 0 15px var(--july-red);
            color: #fff !important;
        }

        /* Search Bar High Quality */
        .search-container {
            display: inline-flex; background: #111; border: 1px solid #333;
            border-radius: 30px; padding: 5px 15px; margin-left: 10px;
        }
        .search-container input {
            background: transparent; border: none; color: white; width: 100px; outline: none;
        }
        .search-container button {
            background: var(--july-red); border: none; color: white; 
            border-radius: 20px; padding: 5px 15px; cursor: pointer;
        }

        /* Canvas Grid */
        #mainCanvas { background: #000; cursor: crosshair; }
        .map-container { position: relative; width: 100vw; height: 70vh; overflow: hidden; background: #050505; }
        #mover { position: absolute; transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1); }

        /* Round Highlight Effect */
        #highlight-circle {
            position: absolute; width: 100px; height: 100px;
            border: 2px solid var(--july-gold); border-radius: 50%;
            background: rgba(204, 0, 0, 0.2); box-shadow: 0 0 30px var(--july-red);
            pointer-events: none; display: none; z-index: 500;
            transform: translate(-50%, -50%);
        }

        /* Download Popup */
        #plot-card {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            background: #111; border: 2px solid var(--july-red); padding: 20px;
            border-radius: 15px; z-index: 2000; display: none; text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.9); transition: 0.3s;
        }
        .btn-dl { background: #25D366; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold;}
    </style>
</head>
<body>

<div class="top-nav">
    <div class="payment-pills">
        <div class="pill" onclick="copyVal('01756206213')">BKASH: 01756206213</div>
        <div class="pill" onclick="copyVal('01756206213')">ROCKET: 01756206213</div>
    </div>
    <div class="social-icons">
        <a href="https://x.com/kawsar6700" target="_blank" style="color: #1DA1F2; font-size: 30px;"><i class="fab fa-twitter"></i></a>
    </div>
</div>

<div class="hero">
    <div class="ark-logo">ARK</div>
    <h1 class="shimmer-title" style="text-align: center;">THE 36th JULY LEGACY</h1>
    
    <div class="actions" style="text-align: center; margin-top: 20px;">
        <a href="order.html" target="_blank" class="cta-gold">RESERVE PLOT (৳36)</a>
        <button onclick="downloadFullMap()" class="cta-outline">FULL MAP</button>
        <div class="search-container">
            <input type="number" id="plotSearch" placeholder="Plot No.">
            <button onclick="findPlot()">FIND</button>
        </div>
    </div>
</div>

<div class="map-container">
    <div id="mover">
        <div id="highlight-circle"></div>
        <canvas id="mainCanvas"></canvas>
    </div>
</div>

<div id="plot-card">
    <h3 id="card-title" style="color: var(--july-gold);">PLOT #0</h3>
    <p>Creator Information Saved</p>
    <div id="plot-preview" style="width: 150px; height: 150px; background: #222; margin: 10px auto; border: 1px solid #444;"></div>
    <button onclick="downloadPersonalPlot()" class="btn-dl">DOWNLOAD HIGH-RES IMAGE</button>
    <button onclick="closeCard()" style="background:none; border:none; color:#777; cursor:pointer; display:block; margin: 10px auto;">CLOSE</button>
</div>

<footer>THE 36th JULY LEGACY | ARK PROJECT © 2026</footer>
<a href="https://wa.me/8801756206213" target="_blank" class="wa-float"><i class="fab fa-whatsapp"></i> SUPPORT</a>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const plotSize = 50;
    const totalPlots = 36000;
    const cols = 30; // প্রতি সারিতে ৩০টি প্লট
    const rows = Math.ceil(totalPlots / cols);

    canvas.width = cols * plotSize;
    canvas.height = rows * plotSize;

    function drawGrid() {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= canvas.width; x += plotSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += plotSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }
    drawGrid();

    // সার্চ এবং রাউন্ড হাইলাইট ফাংশন
    let currentFoundPlot = 0;
    function findPlot() {
        const num = parseInt(document.getElementById('plotSearch').value);
        if(num > 0 && num <= totalPlots) {
            currentFoundPlot = num;
            const r = Math.floor((num - 1) / cols);
            const c = (num - 1) % cols;
            
            const x = c * plotSize;
            const y = r * plotSize;

            // ভিউপোর্টের মাঝখানে নিয়ে আসা
            const moveX = (window.innerWidth / 2) - x - (plotSize / 2);
            const moveY = (window.innerHeight / 2) - y - (plotSize / 2);
            
            document.getElementById('mover').style.transform = `translate(${moveX}px, ${moveY}px)`;
            
            // রাউন্ড হাইলাইট ইফেক্ট
            const circle = document.getElementById('highlight-circle');
            circle.style.display = "block";
            circle.style.left = (x + plotSize/2) + "px";
            circle.style.top = (y + plotSize/2) + "px";

            // ডাউনলোড কার্ড শো করা
            setTimeout(() => {
                document.getElementById('plot-card').style.display = "block";
                document.getElementById('plot-card').style.transform = "translate(-50%, -50%) scale(1)";
                document.getElementById('card-title').innerText = "PLOT #" + num;
            }, 700);
        }
    }

    // নির্দিষ্ট প্লট ডাউনলোড (High Quality)
    function downloadPersonalPlot() {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = 500; // বড় সাইজে ডাউনলোড হবে
        tempCanvas.height = 500;
        const tCtx = tempCanvas.getContext('2d');
        
        // বর্তমান ক্যানভাস থেকে ওই অংশটুকু কেটে নেওয়া
        const r = Math.floor((currentFoundPlot - 1) / cols);
        const c = (currentFoundPlot - 1) % cols;
        
        tCtx.fillStyle = "#000";
        tCtx.fillRect(0,0,500,500);
        tCtx.drawImage(canvas, c * plotSize, r * plotSize, plotSize, plotSize, 50, 50, 400, 400);
        
        const link = document.createElement('a');
        link.download = 'ARK_PLOT_' + currentFoundPlot + '.png';
        link.href = tempCanvas.toDataURL("image/png", 1.0);
        link.click();
    }

    function closeCard() {
        document.getElementById('plot-card').style.display = "none";
        document.getElementById('highlight-circle').style.display = "none";
    }

    function downloadFullMap() {
        const link = document.createElement('a');
        link.download = 'ARK_FULL_MAP.png';
        link.href = canvas.toDataURL();
        link.click();
    }

    function copyVal(val) {
        navigator.clipboard.writeText(val);
        alert("Copied: " + val);
    }
</script>
</body>
</html>
