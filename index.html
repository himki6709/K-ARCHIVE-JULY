<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARK ARCHIVE | THE 36th JULY LEGACY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --blood-dark: #660000;
            --blood-bright: #ff0e0e;
            --july-gold: #FCD535;
            --bg-deep: #020202;
        }

        body { 
            background: var(--bg-deep); 
            color: #fff; 
            margin: 0; 
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, rgba(102, 0, 0, 0.1) 0%, transparent 80%);
        }

        /* Blood Splatter Watermark Effect */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/blood-splatter.png');
            opacity: 0.15;
            pointer-events: none;
            z-index: 1;
        }

        /* Top Navigation - Clean & Professional */
        .top-bar {
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .payment-pills { display: flex; gap: 15px; }
        .pill {
            background: rgba(255,255,255,0.03);
            border: 1px solid #333;
            padding: 8px 18px;
            border-radius: 4px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
        }
        .pill:hover { background: var(--blood-dark); border-color: var(--blood-bright); }

        .social-support { display: flex; gap: 20px; align-items: center; }
        .social-support a { color: #fff; font-size: 24px; transition: 0.3s; }
        .fa-twitter:hover { color: #1DA1F2; }
        .fa-whatsapp:hover { color: #25D366; }

        /* ARK Logo Visuals */
        .ark-branding {
            text-align: center;
            padding: 80px 20px;
            position: relative;
            z-index: 2;
        }
        .ark-logo {
            font-size: 110px;
            font-weight: 900;
            letter-spacing: 20px;
            color: var(--blood-bright);
            text-shadow: 0 0 20px rgba(255, 14, 14, 0.5), 5px 5px 0px #000;
            margin: 0;
            line-height: 1;
        }
        .sub-tag { color: #888; letter-spacing: 5px; margin-top: 10px; font-size: 14px; }

        /* New Action Area */
        .action-panel {
            max-width: 1000px;
            margin: 0 auto 60px;
            background: rgba(255,255,255,0.02);
            border: 1px solid #111;
            padding: 30px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            z-index: 2;
            position: relative;
        }

        .btn {
            padding: 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            border: none;
            font-size: 14px;
        }
        .btn-buy { background: var(--blood-bright); color: #fff; }
        .btn-full-dl { background: #1a1a1a; color: #fff; border: 1px solid #333; }
        .btn-buy:hover { transform: scale(1.03); box-shadow: 0 0 20px var(--blood-dark); }

        /* Search Box */
        .search-box {
            display: flex;
            background: #000;
            border: 1px solid #333;
            border-radius: 6px;
            overflow: hidden;
        }
        .search-box input {
            background: transparent; border: none; color: #fff; padding: 15px; width: 100%; outline: none;
        }
        .search-box button {
            background: var(--blood-dark); color: #fff; border: none; padding: 0 20px; cursor: pointer;
        }

        /* --- THE CANVAS AREA --- */
        .canvas-container {
            width: 100%;
            display: flex;
            justify-content: center;
            background: #000;
            padding: 100px 0;
            position: relative;
            z-index: 2;
        }
        #mainCanvas { border: 1px solid #111; box-shadow: 0 0 50px rgba(0,0,0,0.5); }

        /* Exact Highlight */
        #plot-highlight {
            position: absolute; width: 50px; height: 50px;
            border: 2px solid var(--july-gold);
            background: rgba(255, 14, 14, 0.15);
            box-shadow: 0 0 15px var(--blood-bright);
            pointer-events: none; display: none;
            z-index: 500;
        }

        /* Modal Card */
        #plot-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #080808; border: 1px solid var(--blood-dark);
            padding: 40px; border-radius: 4px; z-index: 2000; display: none;
            text-align: center; box-shadow: 0 0 100px #000; width: 350px;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="payment-pills">
        <div class="pill" onclick="copyValue('01756206213')">BKASH: 01756206213</div>
        <div class="pill" onclick="copyValue('01756206213')">ROCKET: 01756206213</div>
    </div>
    <div class="social-support">
        <a href="https://x.com/kawsar6700" target="_blank" title="Twitter"><i class="fab fa-twitter"></i></a>
        <a href="https://wa.me/8801756206213" target="_blank" title="Support"><i class="fab fa-whatsapp"></i></a>
    </div>
</div>

<div class="ark-branding">
    <h1 class="ark-logo">ARK</h1>
    <div class="sub-tag">THE 36th JULY LEGACY ARCHIVE</div>
</div>

<div class="action-panel">
    <a href="order.html" target="_blank" class="btn btn-buy">RESERVE LEGACY PLOT (৳36)</a>
    <button onclick="downloadFullMap()" class="btn btn-full-dl">DOWNLOAD ENTIRE CANVAS</button>
    <div class="search-box">
        <input type="number" id="plotSearch" placeholder="Enter Plot Number (1-36000)">
        <button onclick="findPlot()">SEARCH</button>
    </div>
</div>

<div class="canvas-container">
    <div id="plot-highlight"></div>
    <canvas id="mainCanvas"></canvas>
</div>

<div id="plot-modal">
    <h2 style="color: var(--july-gold); margin: 0; font-size: 24px;">ARK ARCHIVE</h2>
    <p style="color: #666; font-size: 12px; margin-bottom: 25px;">LEGACY VERIFICATION SYSTEM</p>
    <div id="preview-area" style="width: 150px; height: 150px; background: #111; margin: 0 auto 20px; border: 1px solid #222;"></div>
    <button onclick="downloadPlotImage()" class="btn btn-buy" style="width: 100%;">DOWNLOAD PLOT IMAGE</button>
    <button onclick="closeModal()" style="background:none; border:none; color:#444; margin-top:20px; cursor:pointer; text-decoration: underline;">CLOSE PREVIEW</button>
</div>

<footer style="padding: 100px; text-align: center; border-top: 1px solid #111; color: #333; font-size: 12px;">
    ARK ARCHIVE • OFFICIAL COMMEMORATION PROJECT © 2026
</footer>

<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const plotSize = 50;
    const totalPlots = 36000;
    const cols = 30;
    const rows = Math.ceil(totalPlots / cols);

    canvas.width = cols * plotSize;
    canvas.height = rows * plotSize;

    function drawGrid() {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.08)";
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= canvas.width; x += plotSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += plotSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }
    drawGrid();

    let currentNum = 0;

    // --- EXACT FOCUS LOGIC (100% ACCURATE) ---
    function findPlot() {
        const num = parseInt(document.getElementById('plotSearch').value);
        if(num > 0 && num <= totalPlots) {
            currentNum = num;
            const r = Math.floor((num - 1) / cols);
            const c = (num - 1) % cols;
            
            const px = c * plotSize;
            const py = r * plotSize;

            const container = document.querySelector('.canvas-container');
            const targetScroll = (container.offsetTop + py) - (window.innerHeight / 2) + (plotSize / 2);

            window.scrollTo({ top: targetScroll, behavior: 'smooth' });

            const highlight = document.getElementById('plot-highlight');
            highlight.style.display = "block";
            highlight.style.left = px + "px";
            highlight.style.top = py + "px";

            setTimeout(() => {
                document.getElementById('plot-modal').style.display = "block";
            }, 800);
        } else {
            alert("Error: Please enter a valid plot number between 1 and 36000.");
        }
    }

    // --- ULTRA HQ PLOT DOWNLOAD ---
    function downloadPlotImage() {
        const dl = document.createElement('canvas');
        dl.width = 1200; // Ultra HQ
        dl.height = 1200;
        const dctx = dl.getContext('2d');
        
        dctx.fillStyle = "#000";
        dctx.fillRect(0,0,1200,1200);
        
        const r = Math.floor((currentNum - 1) / cols);
        const c = (currentNum - 1) % cols;
        dctx.drawImage(canvas, c * plotSize, r * plotSize, plotSize, plotSize, 250, 350, 700, 700);
        
        // Branding in Image
        dctx.fillStyle = "#FCD535";
        dctx.textAlign = "center";
        dctx.font = "bold 55px Arial";
        dctx.fillText("ARK ARCHIVE", 600, 150);
        
        dctx.fillStyle = "#ffffff";
        dctx.font = "35px Arial";
        dctx.fillText("THE 36th JULY LEGACY ARCHIVE PLOT #" + currentNum, 600, 220);
        
        const link = document.createElement('a');
        link.download = `ARK_LEGACY_PLOT_${currentNum}.png`;
        link.href = dl.toURL ? dl.toURL("image/png") : dl.toDataURL("image/png", 1.0);
        link.click();
    }

    function downloadFullMap() {
        const link = document.createElement('a');
        link.download = 'ARK_FULL_ARCHIVE_MAP.png';
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
    }

    function closeModal() {
        document.getElementById('plot-modal').style.display = "none";
        document.getElementById('plot-highlight').style.display = "none";
    }

    function copyValue(val) {
        navigator.clipboard.writeText(val);
        alert("Payment Number Copied: " + val);
    }
</script>
</body>
</html>
