<script>
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const plotSize = 50;
    const totalPlots = 36000;
    const cols = 30; // প্রতি সারিতে ৩০টি প্লট
    const rows = Math.ceil(totalPlots / cols); // ১২০০ সারি

    canvas.width = cols * plotSize;
    canvas.height = rows * plotSize;

    // গ্রিড ডিজাইন (সাদা চিকন দাগ)
    function drawGrid() {
        ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
        ctx.lineWidth = 0.5;
        for (let x = 0; x <= canvas.width; x += plotSize) {
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
        }
        for (let y = 0; y <= canvas.height; y += plotSize) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
        }
    }
    drawGrid();

    // সার্চ ফাংশন (ল্যাগিং ফিক্সড)
    function findPlot() {
        const num = parseInt(document.getElementById('plotSearch').value);
        if(num > 0 && num <= totalPlots) {
            const r = Math.floor((num - 1) / cols);
            const c = (num - 1) % cols;
            
            // ক্যানভাস ভিউপোর্ট অনুযায়ী পজিশন ক্যালকুলেশন
            const targetX = (c * plotSize) - (window.innerWidth / 4);
            const targetY = (r * plotSize) - 200;
            
            document.getElementById('mover').style.transform = `translate(${-Math.max(0, targetX)}px, ${-Math.max(0, targetY)}px)`;
            
            // প্লটটিকে হাইলাইট করা
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.fillRect(c * plotSize, r * plotSize, plotSize, plotSize);
            setTimeout(() => {
                ctx.clearRect(c * plotSize, r * plotSize, plotSize, plotSize);
                drawGrid();
            }, 2000);
        } else {
            alert("Enter valid Plot No (1-36000)");
        }
    }

    // হাই-কোয়ালিটি ডাউনলোড
    function highResDownload() {
        const link = document.createElement('a');
        link.download = 'ARK_JULY_MAP_36000.png';
        link.href = canvas.toDataURL("image/png", 1.0);
        link.click();
    }

    function copyVal(val) {
        navigator.clipboard.writeText(val);
        alert("Copied: " + val);
    }
</script>
