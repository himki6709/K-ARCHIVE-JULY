<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MANUAL UPDATE | ARK ARCHIVE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; text-align: center; }
        h2 { letter-spacing: 5px; font-size: 18px; margin-bottom: 30px; color: #444; }
        .rr-input { width: 100%; background: #000; border: 1px solid #222; padding: 15px; color: #fff; margin-bottom: 15px; outline: none; box-sizing: border-box; font-size: 12px; }
        .rr-input:focus { border-color: #555; }
        .btn { width: 100%; background: #fff; color: #000; border: none; padding: 15px; cursor: pointer; font-weight: bold; letter-spacing: 2px; font-size: 10px; transition: 0.3s; }
        .btn:hover { background: #ccc; }
        .back-link { margin-top: 20px; display: block; color: #444; text-decoration: none; font-size: 10px; }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
</head>
<body>

<div class="card">
    <h2>DIRECT PUBLISH</h2>
    
    <input type="number" id="mPlot" class="rr-input" placeholder="PLOT NUMBER (e.g. 1)">
    <input type="text" id="mName" class="rr-input" placeholder="CUSTOMER FULL NAME">
    <input type="text" id="mImg" class="rr-input" placeholder="PHOTO URL (Direct Link)">
    <input type="text" id="mWeb" class="rr-input" placeholder="WEBSITE/SOCIAL LINK (Optional)">
    
    <button class="btn" onclick="directPublish()">GO LIVE NOW</button>
    
    <a href="index.html" class="back-link">BACK TO ARCHIVE</a>
</div>

<script>
    // Firebase Configuration (Same as index.html)
    const firebaseConfig = {
        apiKey: "AIzaSyCAdnfu2R82xbC7H85n_9mvQBE58X3TjbA",
        authDomain: "the-5k-elite-legacy.firebaseapp.com",
        databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com",
        projectId: "the-5k-elite-legacy",
        storageBucket: "the-5k-elite-legacy.firebasestorage.app",
        messagingSenderId: "440824313752",
        appId: "1:440824313752:web:2c93344dcfe2ba0a4c5ded"
    };

    // Initialize Firebase
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.database();

    function directPublish() {
        const pid = document.getElementById('mPlot').value;
        const name = document.getElementById('mName').value;
        const img = document.getElementById('mImg').value;
        const web = document.getElementById('mWeb').value;

        // Validation
        if(!pid || !name || !img) {
            alert("Please fill Plot Number, Name and Image URL!");
            return;
        }

        // সরাসরি pixels নোডে ডাটা সেভ করা হচ্ছে
        db.ref('pixels/' + pid).set({
            name: name,
            imageUrl: img,
            link: web || "#",
            plotID: pid,
            updatedAt: Date.now()
        }).then(() => {
            alert("SUCCESS! Plot #" + pid + " is now live with name: " + name);
            // ইনপুট ফিল্ড ক্লিয়ার করা
            document.getElementById('mPlot').value = "";
            document.getElementById('mName').value = "";
            document.getElementById('mImg').value = "";
            document.getElementById('mWeb').value = "";
        }).catch((error) => {
            alert("Error: " + error.message);
        });
    }
</script>

</body>
</html>
