<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESERVE | THE JULY LEGACY</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --rr-silver: #E1E1E1;
            --rr-black: #000000;
            --rr-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: var(--rr-black);
            color: var(--rr-silver);
            font-family: 'Times New Roman', serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            letter-spacing: 1px;
            overflow: hidden;
        }

        .box {
            background: #050505;
            padding: 50px 40px;
            border: 1px solid var(--rr-border);
            text-align: center;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        .instruction-card {
            background: rgba(255, 255, 255, 0.02);
            color: #888;
            padding: 20px;
            border-radius: 2px;
            font-size: 12px;
            margin-bottom: 30px;
            border: 1px solid #111;
            line-height: 1.8;
            text-align: left;
        }

        .instruction-card b { color: #fff; }

        h2 {
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 35px;
            font-weight: 300;
            color: #fff;
        }

        .rr-input {
            width: 100%;
            padding: 15px 0;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--rr-border);
            color: #fff;
            font-size: 16px;
            margin-bottom: 25px;
            text-align: center;
            outline: none;
            transition: 0.4s;
        }

        .rr-input:focus {
            border-bottom-color: #fff;
        }

        .btn {
            width: 100%;
            padding: 18px;
            background: #fff;
            color: #000;
            font-weight: bold;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 14px;
            margin-top: 15px;
            transition: 0.4s;
        }

        .btn:hover { background: #ccc; }

        .back {
            display: inline-block;
            margin-top: 30px;
            color: #444;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .back:hover { color: #fff; }

        /* Success Screen */
        #celeb {
            display: none;
            position: fixed;
            inset: 0;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 100;
            background: #fff; /* Rolls Royce minimalist white success screen */
        }
    </style>
</head>
<body>

    <div class="box" id="f-box">
        <div class="instruction-card">
            1. Pay <b>৳36</b> to bKash: <b>01756206213</b><br>
            2. Submit your request below.<br>
            3. Send Screenshot & Photo to: <b>01576940717</b> (WhatsApp)
        </div>
        
        <h2>Claim Your Plot</h2>
        
        <input type="text" id="bn" class="rr-input" placeholder="FULL IDENTITY / NAME">
        <input type="number" id="pn" class="rr-input" placeholder="PLOT NUMBER (1-36000)">
        
        <button class="btn" onclick="submitOrder()">Request Acquisition</button>
        
        <a href="index.html" class="back">← Return to Archive</a>
    </div>

    <div id="celeb">
        <h1 style="color:#000; font-size: 35px; letter-spacing: 8px; font-weight: 300; text-transform: uppercase;">REQUEST RECEIVED</h1>
        <h2 id="ub" style="color:#666; font-size: 18px; margin-top: 10px;"></h2>
        <p style="color: #999; font-size: 12px; letter-spacing: 2px; margin-top: 40px;">REDIRECTING TO ARCHIVE...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({databaseURL: "https://the-5k-elite-legacy-default-rtdb.firebaseio.com/"});

        function submitOrder() {
            const n = document.getElementById('bn').value, 
                  p = document.getElementById('pn').value;

            if(!n || !p || p < 1 || p > 36000) {
                return alert("Please enter a valid Name and Plot Number (1-36000)!");
            }

            firebase.database().ref('orders/'+p).set({
                name: n, 
                plotID: p,
                timestamp: Date.now()
            }).then(() => {
                document.getElementById('ub').innerText = n.toUpperCase();
                document.getElementById('f-box').style.display='none';
                document.getElementById('celeb').style.display='flex';
                
                // Luxury Confetti (White & Grey)
                var end = Date.now() + 4000;
                (function frame() {
                    confetti({ particleCount: 10, angle: 60, spread: 70, origin: { x: 0, y: 0.6 }, colors: ['#000', '#888'] });
                    confetti({ particleCount: 10, angle: 120, spread: 70, origin: { x: 1, y: 0.6 }, colors: ['#000', '#888'] });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());

                setTimeout(()=> window.location.href="index.html", 5000);
            });
        }
    </script>
</body>
</html>
